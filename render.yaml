services:
  - type: web
    name: event-booking-api
    env: docker
    dockerfilePath: ./EventBookingApi/Dockerfile
    plan: free
    healthCheckPath: /swagger
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:10000
      - key: ConnectionStrings__DefaultConnection
        sync: false
